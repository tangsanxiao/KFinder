name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build macOS release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release artifacts
        run: ./scripts/release.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release/* \
            --title "KFinder ${GITHUB_REF_NAME}" \
            --notes "KFinder macOS test build. This build uses ad-hoc signing, so first launch may require right-click Open or approving it in System Settings."
